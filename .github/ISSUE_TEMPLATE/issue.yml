name: Issue
description: 기능 요청, 버그 리포트, 개선 사항 등 모든 이슈를 작성합니다.
labels: []
assignees: []
body:
  - type: dropdown
    id: type
    attributes:
      label: 타입
      options:
        - feat (새 기능)
        - fix (버그 수정)
        - docs (문서)
        - refactor (리팩토링)
        - chore (기타)
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - "P0: 즉시 (서비스 장애, 크리티컬 버그)"
        - "P1: 높음 (이번 주 내 처리)"
        - "P2: 보통 (백로그)"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 무엇을 해야 하는지 구체적으로 작성해주세요.
      placeholder: |
        ## 배경
        왜 이 작업이 필요한지

        ## 상세 내용
        구체적으로 무엇을 해야 하는지

        ## 완료 조건
        어떤 상태가 되면 완료인지
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 PR, 링크, 스크린샷 등 (선택)
      placeholder: "관련 PR: #00, 참고 문서: https://..."
    validations:
      required: false
